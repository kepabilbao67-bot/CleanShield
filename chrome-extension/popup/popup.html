<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: white;
      padding: 1.25rem;
    }
    .header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    .header h1 { font-size: 1.1rem; color: #00b894; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1rem; }
    .stat {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px; padding: 0.75rem; text-align: center;
    }
    .stat-val { font-size: 1.5rem; font-weight: 700; }
    .stat-val.streak { color: #f6ad55; }
    .stat-val.blocked { color: #fc8181; }
    .stat-label { font-size: 0.7rem; color: #718096; margin-top: 0.25rem; }
    .status-row {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,184,148,0.1); border-radius: 10px;
      padding: 0.75rem 1rem; margin-bottom: 1rem;
    }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #00b894; }
    .status-dot.off { background: #fc8181; }
    .status-text { font-size: 0.85rem; font-weight: 600; }
    .btn {
      width: 100%; padding: 0.7rem; border: none; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
      margin-bottom: 0.5rem; transition: all 0.2s;
    }
    .btn-primary { background: linear-gradient(135deg, #00b894, #00cec9); color: white; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: rgba(255,255,255,0.1); color: #a0aec0; }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); color: white; }
    .quote { font-style: italic; font-size: 0.8rem; color: #718096; text-align: center; margin-top: 0.75rem; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:1.5rem;">🛡️</span>
    <h1>CleanShield</h1>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val streak" id="streak">0</div>
      <div class="stat-label">Dias Limpios</div>
    </div>
    <div class="stat">
      <div class="stat-val blocked" id="blocked">0</div>
      <div class="stat-label">Bloqueados Hoy</div>
    </div>
  </div>

  <div class="status-row">
    <span class="status-text" id="statusText">Proteccion Activa</span>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <button class="btn btn-primary" id="dashboardBtn">📊 Panel de Recuperacion</button>
  <button class="btn btn-secondary" id="breatheBtn">🧘 Respirar Ahora</button>

  <p class="quote" id="quote"></p>

  <script src="popup.js"></script>
</body>
</html>
